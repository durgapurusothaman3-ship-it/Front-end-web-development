<!DOCTYPE html>
<html>
<head>
  <title>Digital Clock</title>
</head>
<body>
<h1>DIGITAL CLOCK</h1>
<h1 id="clock"></h1>


<script>
function showTime() {
  let now = new Date();
  let time = now.toLocaleTimeString();
  document.getElementById("clock").innerHTML = time;
}

setInterval(showTime, 1000);
</script>

</body>
</html>
